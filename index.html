<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; color: white; padding: 2rem; }
        h1 { font-size: 4rem; font-weight: 700; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p { font-size: 1.5rem; opacity: 0.9; }
        .emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">👋</span>
        <h1>Hello, World!</h1>
        <p>Welcome to my first website. Built with ❤️</p>
    </div>
</body>
</html>
